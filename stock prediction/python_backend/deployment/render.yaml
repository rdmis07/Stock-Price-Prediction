services:
  - type: web
    name: quantumstock-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: quantumstock-db
          property: connectionString
      - key: APP_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: quantumstock-db
    plan: starter
    databaseName: quantumstock
    user: quantum
